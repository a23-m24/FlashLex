spring.application.name=backend

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/flashlex?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jackson.serialization.write-dates-as-timestamps=false

app.jwt.secret=${JWT_SECRET:flashlex-development-secret-with-at-least-32-chars}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}
